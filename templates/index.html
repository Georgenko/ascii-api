<!DOCTYPE html>
<html lang="en">
<head>
    <title>ASCII art API</title>
    <script src="/static/js/app.js"></script>
    <script src="/static/js/api.js"></script>
    <script src="/static/js/banner.js"></script>
    <style>
        body { display: flex; margin: 0; }
        nav { padding: 1rem; border-right: 1px solid #ccc; }
        nav a { display: block; margin: 0.5rem 0; cursor: pointer; }
        main { padding: 1rem; flex: 1; }
    </style>
</head>
<body>
<nav>
    <h1>ASCII art API</h1>
    <a onclick="show('text-to-banner')">Text -> Banner</a>
    <a onclick="show('image-to-ascii')">Image -> ASCII</a>
    <a onclick="show('prompt-to-ascii')">Prompt -> ASCII</a>
</nav>
<main>
    <div id="text-to-banner" class="section">
        <h2>Text -> ASCII</h2>
        <input type="text" placeholder="Write your text here..."/>
        <button onclick="convertTextToBanner()">Convert</button>
    </div>
    <div id="image-to-ascii" class="section">
        <h2>Image -> ASCII</h2>
        <input type="file" accept="image/*"/>
        <button>Convert</button>
    </div>
    <div id="prompt-to-ascii" class="section">
        <h2>Prompt -> ASCII</h2>
        <textarea placeholder="Write your prompt here..."></textarea>
        <button>Generate</button>
    </div>
    <div id="result-view">
        <button onclick="show(lastSection)">← Back</button>
        <pre id="result"></pre>
    </div>
    <div id="more">
        <p>You can check the <a href="/docs">Swagger</a> or <a href="/redoc">ReDoc</a> docs</p>
    </div>
</main>
</body>
</html>
